<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="novaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d9ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background with subtle dark theme -->
  <rect width="192" height="192" fill="#0a0e27"/>
  
  <!-- Main cloud/server shape -->
  <g transform="translate(96, 96)">
    <!-- Outer glowing circle -->
    <circle cx="0" cy="0" r="70" fill="none" stroke="url(#novaGradient)" stroke-width="2" opacity="0.3"/>
    
    <!-- Core hexagon representing server infrastructure -->
    <path d="M 0,-45 L 39,-22.5 L 39,22.5 L 0,45 L -39,22.5 L -39,-22.5 Z" 
          fill="none" stroke="url(#novaGradient)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Center dot (core infrastructure) -->
    <circle cx="0" cy="0" r="6" fill="url(#novaGradient)"/>
    
    <!-- Connection nodes (performance/network) -->
    <circle cx="0" cy="-30" r="4" fill="#00d9ff" opacity="0.8"/>
    <circle cx="26" cy="-15" r="4" fill="#7c3aed" opacity="0.8"/>
    <circle cx="26" cy="15" r="4" fill="#00d9ff" opacity="0.8"/>
    <circle cx="0" cy="30" r="4" fill="#7c3aed" opacity="0.8"/>
    <circle cx="-26" cy="15" r="4" fill="#00d9ff" opacity="0.8"/>
    <circle cx="-26" cy="-15" r="4" fill="#7c3aed" opacity="0.8"/>
  </g>
</svg>