# ========================================
# NovaHost Nginx Security Configuration
# ========================================
# Place this in your nginx server block

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name novahost.dev www.novahost.dev;
    
    # Redirect HTTP to HTTPS
    server {
        listen 80;
        listen [::]:80;
        server_name novahost.dev www.novahost.dev;
        return 301 https://$server_name$request_uri;
    }

    # SSL Configuration
    ssl_certificate /path/to/your/certificate.crt;
    ssl_certificate_key /path/to/your/private.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "accelerometer=(),camera=(),geolocation=(),gyroscope=(),magnetometer=(),microphone=(),payment=(),usb=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; upgrade-insecure-requests; block-all-mixed-content" always;

    # Hide Nginx version
    server_tokens off;

    # Root directory
    root /var/www/novahost;
    index index.html;

    # Disable directory listing
    autoindex off;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_vary on;

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|otf)$ {
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Don't cache HTML
    location ~* \.html?$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate, proxy-revalidate";
    }

    # Deny access to sensitive files
    location ~ /\.(env|json|config|private|secret|sql)$ {
        deny all;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }

    # Deny access to backup files
    location ~ ~$ {
        deny all;
    }

    # Disable TRACE method
    if ($request_method = TRACE) {
        return 405;
    }

    # Single Page Application routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Manifest and favicon
    location = /manifest.json {
        add_header Content-Type "application/manifest+json";
        expires 30d;
    }

    location = /favicon.svg {
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Logging
    access_log /var/log/nginx/novahost.log combined;
    error_log /var/log/nginx/novahost.error.log warn;

    # Request limits (prevent DDoS)
    limit_req_zone $binary_remote_addr zone=primary:10m rate=10r/s;
    limit_req zone=primary burst=20 nodelay;

    # Max upload size
    client_max_body_size 10M;

    # Timeouts
    client_connect_timeout 60;
    client_send_timeout 60;
    client_body_timeout 60;
    send_timeout 60;

    # Hide PHP execution (important for security)
    location ~ \.php$ {
        deny all;
    }
}

# Rate limiting configuration
limit_req_zone $binary_remote_addr zone=api:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=contact:10m rate=3r/m;

# Upstream backend (if you have a Node.js/Python backend)
upstream backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

# Proxy configuration (for API endpoints)
server {
    # ... location blocks ...
    
    location /api/ {
        limit_req zone=api burst=10 nodelay;
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /contact {
        limit_req zone=contact burst=5 nodelay;
        # Rate limit form submissions
        if ($request_method = POST) {
            return 429;  # Too Many Requests
        }
    }
}
